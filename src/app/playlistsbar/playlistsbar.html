<div class="h-full bg-[#121212] flex flex-col transition-all duration-300 ease-in-out border-r border-white/5 relative"
     [class.w-80]="isExpanded" [class.w-20]="!isExpanded">
  
  <!-- Header of Sidebar -->
  <div class="p-4 flex items-center justify-between mb-2" [class.flex-col]="!isExpanded">
    
    <!-- Library Title + Toggle Icon -->
    <div class="flex items-center gap-2">
      <button (click)="toggleSidebar()" 
              class="flex items-center gap-4 text-gray-400 hover:text-white transition-colors p-2 rounded-md hover:bg-white/5"
              [title]="isExpanded ? 'Thu gọn danh sách phát' : 'Mở rộng danh sách phát'">
        <i class='bx bx-library text-2xl' [class.text-white]="!isExpanded"></i>
        <span *ngIf="isExpanded" class="font-bold text-[15px]">Danh sách phát của bạn</span>
      </button>
    </div>
    
    <!-- Explicit Arrow Toggle & Create Button -->
    <div class="flex items-center gap-2" [class.mt-4]="!isExpanded">
      <button *ngIf="!isExpanded" (click)="toggleSidebar()" 
              class="p-2 text-gray-400 hover:text-white hover:bg-white/5 rounded-full transition-colors"
              title="Mở rộng danh sách phát">
        <i class='bx bx-right-arrow-alt text-xl'></i>
      </button>
      
      <button *ngIf="isExpanded" (click)="createPlaylist()"
              class="p-2 text-gray-400 hover:text-white hover:bg-white/5 rounded-full transition-colors tooltip"
              title="Tạo playlist mới">
        <i class='bx bx-plus text-xl'></i>
      </button>
      <button *ngIf="!isExpanded" (click)="createPlaylist()"
              class="p-2 text-gray-400 hover:text-white hover:bg-white/5 rounded-full transition-colors"
              title="Tạo playlist mới">
        <i class='bx bx-plus text-xl'></i>
      </button>
      
      <!-- Arrow toggle left when expanded -->
      <button *ngIf="isExpanded" (click)="toggleSidebar()" 
              class="p-2 text-gray-400 hover:text-white hover:bg-white/5 rounded-full transition-colors"
              title="Thu gọn">
        <i class='bx bx-left-arrow-alt text-xl'></i>
      </button>
    </div>
  </div>

  <!-- Search Box -->
  <div *ngIf="isExpanded" class="px-4 mb-3 shrink-0">
    <div class="relative flex items-center bg-white/5 rounded-lg border border-white/5 focus-within:border-white/15 focus-within:bg-white/10 transition-all duration-200">
      <i class='bx bx-search text-gray-400 text-lg ml-3 shrink-0'></i>
      <input type="text" 
             [value]="searchTerm"
             (input)="onSearchInput($event)"
             placeholder="Tìm kiếm danh sách phát..." 
             class="w-full bg-transparent border-none outline-none py-2 pl-2 pr-8 text-sm text-white placeholder-gray-500" />
      <button *ngIf="searchTerm" 
              (click)="clearSearch()" 
              class="absolute right-2 text-gray-400 hover:text-white transition-colors flex items-center justify-center">
        <i class='bx bx-x text-lg'></i>
      </button>
    </div>
  </div>

  <!-- Playlists Container (Scrollable) -->
  <div class="flex-1 overflow-y-auto px-2 pb-48 scrollbar-hide">
    
    <!-- Placeholder khi CHƯA ĐĂNG NHẬP -->
    <ng-container *ngIf="!isLoggedIn">
      <!-- Khi sidebar mở rộng -->
      <div *ngIf="isExpanded" class="p-4 mx-2 bg-white/5 rounded-lg border border-white/5 flex flex-col items-center text-center gap-3">
        <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center">
          <i class='bx bxs-playlist text-gray-400 text-2xl'></i>
        </div>
        <div>
          <h4 class="text-sm font-semibold text-white mb-1">Tạo danh sách phát</h4>
          <p class="text-xs text-gray-400 mb-3">Vui lòng đăng nhập để tạo và xem danh sách phát của bạn.</p>
          <a routerLink="/login" class="inline-block px-4 py-2 bg-[#1ed760] text-black text-xs font-bold rounded-full hover:scale-105 active:scale-95 transition-all">
            Đăng nhập
          </a>
        </div>
      </div>

      <!-- Khi sidebar thu gọn -->
      <div *ngIf="!isExpanded" class="flex flex-col items-center py-4">
        <a routerLink="/login" 
           class="w-12 h-12 rounded-full bg-white/5 hover:bg-white/10 text-gray-400 hover:text-white flex items-center justify-center transition-colors"
           title="Đăng nhập để quản lý danh sách phát">
          <i class='bx bx-log-in text-xl'></i>
        </a>
      </div>
    </ng-container>

    <!-- Danh sách Playlists khi ĐÃ ĐĂNG NHẬP -->
    <ul *ngIf="isLoggedIn" class="space-y-1">
      <li *ngFor="let playlist of filteredPlaylists">
        <!-- Render normal link if NOT locked -->
        <a *ngIf="!isPlaylistLocked(playlist)" 
           [routerLink]="['/playlist', playlist.playlistId]" 
           class="flex items-center p-2 rounded-md hover:bg-white/10 transition-colors group"
           [class.justify-center]="!isExpanded">
          <!-- Artwork block placeholder -->
          <div class="w-12 h-12 bg-gray-800 rounded shrink-0 flex items-center justify-center shadow-md overflow-hidden relative">
            <img *ngIf="playlist.coverUrl; else defaultSidebarIcon" [src]="playlist.coverUrl" [alt]="playlist.name" class="h-full w-full object-cover" />
            <ng-template #defaultSidebarIcon>
              <i class='bx bxs-playlist text-gray-400 text-xl group-hover:text-white transition-colors'></i>
            </ng-template>
          </div>
          
          <!-- Playlist Info -->
          <div *ngIf="isExpanded" class="ml-3 overflow-hidden flex-1">
            <p class="text-[15px] font-medium text-white truncate group-hover:text-[#1ed760] transition-colors">{{ playlist.name }}</p>
            <p class="text-sm text-gray-400 truncate">Playlist • Melono</p>
          </div>

          <!-- Song Count -->
          <div *ngIf="isExpanded" class="shrink-0 flex items-center pr-1 ml-2">
            <span class="text-xs text-gray-500 font-medium group-hover:text-gray-300 transition-colors bg-white/5 rounded-full px-2 py-0.5 flex items-center gap-1">
              <i class='bx bx-music text-[10px]'></i>
              {{ playlist.songCount || 0 }} bài
            </span>
          </div>
        </a>

        <!-- Render LOCKED / PRIVATE item if locked -->
        <div *ngIf="isPlaylistLocked(playlist)" 
             class="flex items-center p-2 rounded-md transition-all opacity-50 cursor-not-allowed select-none"
             [class.justify-center]="!isExpanded"
             title="Playlist này đã được chuyển sang chế độ riêng tư">
          <!-- Artwork block with PRIVATE overlay -->
          <div class="w-12 h-12 bg-gray-900 rounded shrink-0 flex items-center justify-center shadow-md overflow-hidden relative border border-white/5">
            <img *ngIf="playlist.coverUrl" [src]="playlist.coverUrl" [alt]="playlist.name" class="h-full w-full object-cover blur-[1px]" />
            <!-- Blur overlay with lock icon & PRIVATE text -->
            <div class="absolute inset-0 bg-black/85 flex flex-col items-center justify-center gap-0.5">
              <i class='bx bx-lock-alt text-red-500 text-sm'></i>
              <span class="text-[8px] font-bold text-red-500 tracking-wider uppercase">Private</span>
            </div>
          </div>
          
          <!-- Playlist Info -->
          <div *ngIf="isExpanded" class="ml-3 overflow-hidden flex-1">
            <p class="text-[15px] font-medium text-gray-500 truncate">{{ playlist.name }}</p>
            <p class="text-xs text-red-500 flex items-center gap-1 font-semibold">
              <i class='bx bx-lock-alt text-[10px]'></i>Riêng tư
            </p>
          </div>

          <!-- Lock tag right -->
          <div *ngIf="isExpanded" class="shrink-0 flex items-center pr-1 ml-2">
            <span class="text-[10px] text-gray-500 font-bold border border-white/10 rounded px-1.5 py-0.5">
              Khóa
            </span>
          </div>
        </div>
      </li>
    </ul>
  </div>

  <!-- Embedded Player -->
  <app-player [isExpanded]="isExpanded" class="absolute bottom-0 w-full left-0"></app-player>

</div>

<style>
  /* Custom scrollbar for sidebar to make it cleaner like Spotify */
  .scrollbar-hide::-webkit-scrollbar {
    width: 8px;
  }
  .scrollbar-hide::-webkit-scrollbar-track {
    background: transparent; 
  }
  .scrollbar-hide::-webkit-scrollbar-thumb {
    background: transparent; 
    border-radius: 4px;
  }
  .scrollbar-hide:hover::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2); 
  }
  .scrollbar-hide::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.4); 
  }
</style>
