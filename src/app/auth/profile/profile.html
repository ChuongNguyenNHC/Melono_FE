<div class="flex h-full w-full overflow-hidden bg-[#0d0d12]">
  <main class="flex-1 overflow-y-auto font-sans text-white scrollbar-hide relative bg-[#0d0d12]">
    
    <!-- Decorative background glow -->
    <div class="absolute top-[-10%] left-[20%] w-[500px] h-[500px] bg-[#1ed760]/10 rounded-full blur-[150px] pointer-events-none z-0"></div>
    <div class="absolute bottom-[-10%] right-[20%] w-[500px] h-[500px] bg-purple-500/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

    <div class="relative z-10 p-8 pb-24 max-w-4xl mx-auto">
      
      <!-- Back Header -->
      <div class="flex items-center gap-4 mb-8">
        <a routerLink="/" class="flex h-10 w-10 items-center justify-center rounded-full bg-white/5 text-white transition hover:bg-white/10 hover:scale-105">
          <i class='bx bx-chevron-left text-2xl'></i>
        </a>
        <div>
          <h1 class="text-3xl font-bold tracking-tight">Hồ sơ cá nhân</h1>
          <p class="text-gray-400 text-sm">Quản lý thông tin tài khoản và mật khẩu của bạn.</p>
        </div>
      </div>

      <!-- Main Profile Box -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8" *ngIf="user">
        
        <!-- Left Column: Avatar & Quick Info Card -->
        <div class="md:col-span-1 flex flex-col items-center p-6 bg-white/5 border border-white/5 rounded-3xl backdrop-blur-xl relative">
          <!-- Avatar Preview -->
          <div class="relative w-32 h-32 group mb-6">
            <img 
              [src]="avatarUrl || 'https://ui-avatars.com/api/?name=' + user.username + '&background=1ed760&color=fff'" 
              alt="Avatar Large" 
              class="w-full h-full object-cover rounded-full border-4 border-white/10 shadow-2xl transition-transform duration-300 group-hover:scale-105"
            />
            <div class="absolute inset-0 bg-black/60 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity cursor-pointer">
              <i class='bx bx-camera text-3xl text-[#1ed760]'></i>
            </div>
          </div>

          <h2 class="text-xl font-bold text-center truncate w-full mb-1">{{ user.name }}</h2>
          <p class="text-sm text-gray-400 mb-6 truncate w-full text-center">{{ user.email }}</p>

          <div class="w-full border-t border-white/5 pt-4 space-y-3">
            <div class="flex justify-between text-sm">
              <span class="text-gray-400">Tên hiển thị:</span>
              <span class="font-semibold truncate max-w-[120px]" [title]="user.name">{{ user.name }}</span>
            </div>
            <div class="flex justify-between text-sm">
              <span class="text-gray-400">Vai trò:</span>
              <span class="px-2 py-0.5 text-xs font-bold rounded-full bg-[#1ed760]/20 text-[#1ed760] uppercase">{{ user.role }}</span>
            </div>
          </div>
        </div>

        <!-- Right Column: Tabs and Form -->
        <div class="md:col-span-2 flex flex-col bg-white/5 border border-white/5 rounded-3xl backdrop-blur-xl overflow-hidden">
          
          <!-- Tab Navigation -->
          <div class="flex border-b border-white/5 bg-black/20">
            <button 
              (click)="setTab('info')"
              [class]="activeTab === 'info' ? 'border-b-2 border-[#1ed760] text-white bg-white/5' : 'text-gray-400 hover:text-white'"
              class="flex-1 py-4 font-bold text-sm tracking-wide transition-all cursor-pointer">
              <i class='bx bx-user-circle mr-1.5 text-lg align-middle'></i> Thông tin cá nhân
            </button>
            <button 
              (click)="setTab('password')"
              [class]="activeTab === 'password' ? 'border-b-2 border-[#1ed760] text-white bg-white/5' : 'text-gray-400 hover:text-white'"
              class="flex-1 py-4 font-bold text-sm tracking-wide transition-all cursor-pointer">
              <i class='bx bx-key mr-1.5 text-lg align-middle'></i> Đổi mật khẩu
            </button>
          </div>

          <!-- Form Area -->
          <div class="p-8">
            
            <!-- Alert Messages -->
            <div *ngIf="errorMessage" class="mb-6 p-4 rounded-xl border border-red-500/20 bg-red-500/10 text-red-400 text-sm flex items-center gap-3">
              <i class='bx bx-error-circle text-xl'></i>
              <span>{{ errorMessage }}</span>
            </div>

            <div *ngIf="successMessage" class="mb-6 p-4 rounded-xl border border-emerald-500/20 bg-emerald-500/10 text-emerald-400 text-sm flex items-center gap-3">
              <i class='bx bx-check-circle text-xl'></i>
              <span>{{ successMessage }}</span>
            </div>

            <!-- Tab 1: Info Form -->
            <form *ngIf="activeTab === 'info'" (ngSubmit)="updateProfileInfo()" class="space-y-6">
              <div *ngIf="user.role === 'ARTIST'">
                <label class="block text-sm font-bold text-gray-300 mb-2">Tên đăng nhập (Username)</label>
                <div class="relative">
                  <i class='bx bx-lock-alt absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg'></i>
                  <input 
                    type="text" 
                    [value]="user.username" 
                    disabled
                    class="w-full h-12 rounded-xl border border-white/5 bg-white/5 pl-12 pr-4 text-sm text-gray-500 cursor-not-allowed outline-none"
                  />
                </div>
              </div>

              <div>
                <label class="block text-sm font-bold text-gray-300 mb-2">Địa chỉ Email</label>
                <div class="relative">
                  <i class='bx bx-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg'></i>
                  <input 
                    type="text" 
                    [value]="user.email" 
                    disabled
                    class="w-full h-12 rounded-xl border border-white/5 bg-white/5 pl-12 pr-4 text-sm text-gray-500 cursor-not-allowed outline-none"
                  />
                </div>
              </div>

              <div>
                <label for="stageNameInput" class="block text-sm font-bold text-gray-300 mb-2">Tên hiển thị</label>
                <div class="relative">
                  <i class='bx bx-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg'></i>
                  <input 
                    id="stageNameInput"
                    type="text" 
                    name="stageName"
                    [(ngModel)]="stageName" 
                    placeholder="Nhập tên hiển thị mới"
                    class="w-full h-12 rounded-xl border border-white/10 bg-[#121218] pl-12 pr-4 text-sm text-white outline-none transition focus:border-[#1ed760] focus:bg-[#181822]"
                  />
                </div>
              </div>

              <div>
                <label for="avatarUrlInput" class="block text-sm font-bold text-gray-300 mb-2">Đường dẫn ảnh đại diện (Avatar URL)</label>
                <div class="relative">
                  <i class='bx bx-link absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg'></i>
                  <input 
                    id="avatarUrlInput"
                    type="text" 
                    name="avatarUrl"
                    [(ngModel)]="avatarUrl" 
                    placeholder="Nhập link ảnh (URL)"
                    class="w-full h-12 rounded-xl border border-white/10 bg-[#121218] pl-12 pr-4 text-sm text-white outline-none transition focus:border-[#1ed760] focus:bg-[#181822]"
                  />
                </div>
              </div>

              <div class="pt-4">
                <button 
                  type="submit" 
                  [disabled]="isLoading"
                  class="w-full h-12 rounded-xl bg-[#1ed760] text-black font-bold tracking-wide transition hover:scale-[1.02] active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 cursor-pointer shadow-lg shadow-[#1ed760]/20">
                  <i class='bx bx-save text-xl' *ngIf="!isLoading"></i>
                  <i class='bx bx-loader-alt text-xl animate-spin' *ngIf="isLoading"></i>
                  <span>Lưu thay đổi</span>
                </button>
              </div>
            </form>

            <!-- Tab 2: Password Form -->
            <form *ngIf="activeTab === 'password'" (ngSubmit)="changePassword()" class="space-y-6">
              <div>
                <label for="currentPasswordInput" class="block text-sm font-bold text-gray-300 mb-2">Mật khẩu hiện tại</label>
                <div class="relative">
                  <i class='bx bx-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg'></i>
                  <input 
                    id="currentPasswordInput"
                    type="password" 
                    name="currentPassword"
                    [(ngModel)]="currentPassword" 
                    placeholder="Nhập mật khẩu hiện tại"
                    class="w-full h-12 rounded-xl border border-white/10 bg-[#121218] pl-12 pr-4 text-sm text-white outline-none transition focus:border-[#1ed760] focus:bg-[#181822]"
                  />
                </div>
              </div>

              <div>
                <label for="newPasswordInput" class="block text-sm font-bold text-gray-300 mb-2">Mật khẩu mới</label>
                <div class="relative">
                  <i class='bx bx-lock-open absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg'></i>
                  <input 
                    id="newPasswordInput"
                    type="password" 
                    name="newPassword"
                    [(ngModel)]="newPassword" 
                    placeholder="Tối thiểu 6 ký tự"
                    class="w-full h-12 rounded-xl border border-white/10 bg-[#121218] pl-12 pr-4 text-sm text-white outline-none transition focus:border-[#1ed760] focus:bg-[#181822]"
                  />
                </div>
              </div>

              <div>
                <label for="confirmPasswordInput" class="block text-sm font-bold text-gray-300 mb-2">Xác nhận mật khẩu mới</label>
                <div class="relative">
                  <i class='bx bx-check-double absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg'></i>
                  <input 
                    id="confirmPasswordInput"
                    type="password" 
                    name="confirmPassword"
                    [(ngModel)]="confirmPassword" 
                    placeholder="Nhập lại mật khẩu mới"
                    class="w-full h-12 rounded-xl border border-white/10 bg-[#121218] pl-12 pr-4 text-sm text-white outline-none transition focus:border-[#1ed760] focus:bg-[#181822]"
                  />
                </div>
              </div>

              <div class="pt-4">
                <button 
                  type="submit" 
                  [disabled]="isLoading"
                  class="w-full h-12 rounded-xl bg-purple-600 text-white font-bold tracking-wide transition hover:scale-[1.02] hover:bg-purple-500 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 cursor-pointer shadow-lg shadow-purple-600/20">
                  <i class='bx bx-key text-xl' *ngIf="!isLoading"></i>
                  <i class='bx bx-loader-alt text-xl animate-spin' *ngIf="isLoading"></i>
                  <span>Đổi mật khẩu</span>
                </button>
              </div>
            </form>

          </div>
        </div>

      </div>

    </div>
  </main>
</div>
