<section class="h-full w-full flex bg-[#070b14] text-slate-100 overflow-hidden">
  <aside class="w-[260px] border-r border-white/10 bg-slate-950/65 px-4 py-6 sm:px-5 xl:px-4 shrink-0 flex flex-col justify-between">
    <div class="space-y-2">
      <button
        *ngFor="let item of tabItems"
        type="button"
        (click)="setActiveTab(item.key)"
        class="group flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left transition"
        [ngClass]="activeTab === item.key
          ? 'bg-emerald-500/12 text-white ring-1 ring-inset ring-emerald-500/30'
          : 'text-slate-400 hover:bg-white/5 hover:text-white'"
      >
        <span
          class="flex h-11 w-11 items-center justify-center rounded-xl text-xl transition"
          [ngClass]="activeTab === item.key
            ? 'bg-emerald-500/15 text-emerald-300'
            : 'bg-white/5 text-slate-400 group-hover:bg-white/10 group-hover:text-white'"
        >
          <i [class]="item.icon"></i>
        </span>

        <span class="flex-1">
          <span class="block text-sm font-semibold">{{ item.label }}</span>
        </span>

        <span
          class="h-8 w-1 rounded-full bg-emerald-400 transition"
          [ngClass]="activeTab === item.key ? 'opacity-100' : 'opacity-0'"
        ></span>
      </button>
    </div>
  </aside>

  <!-- Main Scroll Content Area -->
  <div class="flex-1 min-w-0 overflow-y-auto scrollbar-hide flex flex-col justify-between">
    <main class="px-4 py-6 sm:px-6 xl:px-8 flex-1 pb-8">
      <app-admin-songs
        *ngIf="activeTab === 'songs'"
        [songs]="filteredSongs"
        [search]="songSearch"
        [statusFilter]="songStatusFilter"
        (searchChange)="songSearch = $event"
        (statusFilterChange)="songStatusFilter = $event"
        (refresh)="refreshSongs()"
        (openDrawer)="openSongDrawer($event)"
        (approve)="openApproveSongModal($event)"
        (reject)="openRejectSongModal($event)"
        (hide)="openHideSongModal($event)"
        (restore)="restoreSong($event)"
      ></app-admin-songs>

      <app-admin-users
        *ngIf="activeTab === 'users'"
        [users]="users"
        [search]="userSearch"
        [roleFilter]="userRoleFilter"
        [statusFilter]="userStatusFilter"
        [currentPage]="userPage"
        [pageSize]="userPageSize"
        [totalElements]="userTotalElements"
        [totalPages]="userTotalPages"
        (searchChange)="onUserSearchChange($event)"
        (roleFilterChange)="onUserRoleChange($event)"
        (statusFilterChange)="onUserStatusChange($event)"
        (pageChange)="onUserPageChange($event)"
        (refresh)="refreshUsers()"
        (openDrawer)="openUserDrawer($event)"
        (ban)="openBanUserModal($event)"
        (unban)="openUnbanUserModal($event)"
        (changeRole)="onUserRoleChangeFromAdmin($event)"
      ></app-admin-users>

      <app-admin-artists
        *ngIf="activeTab === 'artists'"
        [requests]="filteredArtistRequests"
        [search]="artistSearch"
        [statusFilter]="artistStatusFilter"
        (searchChange)="artistSearch = $event"
        (statusFilterChange)="artistStatusFilter = $event"
        (refresh)="refreshArtists()"
        (openDrawer)="openArtistDrawer($event)"
        (approve)="openApproveArtistModal($event)"
        (reject)="openRejectArtistModal($event)"
      ></app-admin-artists>

      <app-admin-genres
        *ngIf="activeTab === 'genres'"
        [genres]="genres$ | async"
        (createGenre)="createGenre($event)"
        (approveGenre)="approveGenre($event)"
        (deleteGenre)="deleteGenre($event)"
      ></app-admin-genres>
    </main>

    <!-- Global Footer -->
    <div class="shrink-0 px-4 sm:px-6 xl:px-8 border-t border-white/5 bg-slate-950/20 pt-6">
      <app-footer></app-footer>
    </div>
  </div>

  <app-admin-drawer
    [isOpen]="isDrawerOpen"
    [drawerType]="drawerType"
    [selectedSong]="selectedSong"
    [selectedUser]="selectedUser"
    [selectedArtistRequest]="selectedArtistRequest"
    (close)="closeDrawer()"
    (approveSong)="openApproveSongModal($event)"
    (rejectSong)="openRejectSongModal($event)"
    (hideSong)="openHideSongModal($event)"
    (restoreSong)="restoreSong($event)"
    (banUser)="openBanUserModal($event)"
    (unbanUser)="openUnbanUserModal($event)"
    (approveArtist)="openApproveArtistModal($event)"
    (rejectArtist)="openRejectArtistModal($event)"
  ></app-admin-drawer>

  <app-admin-modal
    [isOpen]="isModalOpen"
    [modalType]="modalType"
    [selectedSong]="selectedSong"
    [selectedUser]="selectedUser"
    [selectedArtistRequest]="selectedArtistRequest"
    [rejectSongReason]="rejectSongReason"
    [banReason]="banReason"
    [rejectArtistReason]="rejectArtistReason"
    (close)="closeModal()"
    (rejectSongReasonChange)="rejectSongReason = $event"
    (banReasonChange)="banReason = $event"
    (rejectArtistReasonChange)="rejectArtistReason = $event"
    (confirmApproveSong)="confirmApproveSong()"
    (confirmRejectSong)="confirmRejectSong()"
    (confirmHideSong)="confirmHideSong()"
    (confirmBanUser)="confirmBanUser()"
    (confirmUnbanUser)="confirmUnbanUser()"
    (confirmApproveArtist)="confirmApproveArtist()"
    (confirmRejectArtist)="confirmRejectArtist()"
  ></app-admin-modal>
</section>
