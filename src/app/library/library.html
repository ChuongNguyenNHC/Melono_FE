<section class="h-full overflow-y-auto bg-[#0d0d12] px-8 py-8 pb-28 text-white">
  <div class="mx-auto max-w-7xl space-y-12" *ngIf="library$ | async as library">
    <header class="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
      <div>
        <p class="text-sm font-bold uppercase tracking-[0.2em] text-[#1ed760]">Thư viện</p>
        <div class="mt-2 flex items-center gap-4">
          <h1 class="text-5xl font-bold tracking-tight">Thư viện</h1>
          <button type="button" class="flex h-12 w-12 items-center justify-center rounded-full bg-white text-black transition hover:scale-105">
            <i class='bx bx-play text-3xl'></i>
          </button>
        </div>
      </div>

      <form class="grid w-full gap-3 rounded-2xl bg-[#181818] p-4 sm:grid-cols-[minmax(0,1fr)_150px_auto] lg:w-[620px]" (ngSubmit)="createPlaylist()">
        <input [(ngModel)]="playlistName" name="playlistName" placeholder="Tên playlist mới" class="h-11 rounded-full border border-white/10 bg-[#24242d] px-4 text-sm outline-none transition focus:border-[#1ed760]" />
        <select [(ngModel)]="playlistStatus" name="playlistStatus" class="h-11 rounded-full border border-white/10 bg-[#24242d] px-4 text-sm outline-none transition focus:border-[#1ed760]">
          <option value="PRIVATE">Riêng tư</option>
          <option value="PUBLIC">Công khai</option>
        </select>
        <button class="h-11 rounded-full bg-[#1ed760] px-6 text-sm font-bold text-black transition hover:scale-105">Tạo</button>
      </form>
    </header>

    <section>
      <div class="mb-6 flex items-center justify-between">
        <h2 class="text-2xl font-bold uppercase">Playlist của bạn</h2>
        <span class="text-sm font-bold uppercase tracking-wider text-gray-500">{{ library.playlists.length }} playlist</span>
      </div>

      <div class="grid grid-cols-2 gap-6 md:grid-cols-3 xl:grid-cols-5">
        <button *ngFor="let playlist of library.playlists; let i = index" type="button" (click)="openPlaylist(playlist)" class="group text-left">
          <div class="relative aspect-square overflow-hidden rounded-md bg-linear-to-br shadow-[0_12px_32px_rgba(0,0,0,0.35)]" [ngClass]="getPlaylistTheme(playlist, i)">
            <img *ngIf="playlist.coverUrl" [src]="playlist.coverUrl" [alt]="playlist.name" class="absolute inset-0 h-full w-full object-cover" />
            <div *ngIf="playlist.coverUrl" class="absolute inset-0 bg-black/25"></div>
            <i class='bx bx-list-music absolute bottom-4 right-4 text-6xl text-black/30'></i>
            <span class="absolute left-4 top-4 rounded-full bg-black/20 px-3 py-1 text-xs font-bold text-white/80">{{ playlist.status === 'PUBLIC' ? 'Công khai' : 'Riêng tư' }}</span>
            <span class="absolute bottom-3 right-3 flex h-12 w-12 translate-y-2 items-center justify-center rounded-full bg-[#1ed760] text-black opacity-0 shadow-xl transition group-hover:translate-y-0 group-hover:opacity-100">
              <i class='bx bx-play text-3xl'></i>
            </span>
          </div>
          <h3 class="mt-3 truncate text-base font-bold">{{ playlist.name }}</h3>
          <p class="mt-1 truncate text-sm text-gray-400">Playlist • Melono</p>
        </button>
      </div>
    </section>

    <section>
      <div class="mb-6 flex items-center justify-between">
        <h2 class="text-2xl font-bold">Danh sách phát gợi ý</h2>
        <button type="button" (click)="toggleShowAllSuggested()" class="text-sm font-bold uppercase tracking-wider text-gray-400 transition hover:text-white">
          {{ showAllSuggested ? 'Thu gọn' : 'Xem tất cả' }}
        </button>
      </div>

      <div [ngClass]="showAllSuggested ? 'grid grid-cols-2 gap-6 md:grid-cols-4 xl:grid-cols-6' : 'flex gap-6 overflow-x-auto pb-3 scrollbar-hide'">
        <button *ngFor="let playlist of suggestedPlaylists" type="button" (click)="openSuggestedPlaylist(playlist)" class="group w-[220px] shrink-0 cursor-pointer rounded-md bg-[#181818] p-4 text-left transition hover:bg-[#282828]">
          <div class="relative aspect-square overflow-hidden rounded-md bg-[#24242d]">
            <img [src]="playlist.coverUrl" [alt]="playlist.title" class="h-full w-full object-cover" />
            <div class="absolute inset-0 bg-linear-to-t from-black/70 to-transparent"></div>
            <span class="absolute bottom-2 right-2 flex h-12 w-12 translate-y-2 items-center justify-center rounded-full bg-[#1ed760] text-black opacity-0 shadow-xl transition group-hover:translate-y-0 group-hover:opacity-100">
              <i class='bx bx-play text-3xl'></i>
            </span>
          </div>
          <h3 class="mt-4 truncate font-bold">{{ playlist.title }}</h3>
          <p class="mt-1 line-clamp-2 text-sm text-gray-400">{{ playlist.description }}</p>
        </button>
      </div>
    </section>
  </div>
</section>
