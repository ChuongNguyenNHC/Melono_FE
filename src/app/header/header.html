<header class="sticky top-0 z-50 flex h-16 w-full items-center justify-between border-b border-white/5 bg-[#0d0d12] px-6">
  <div class="flex items-center gap-8">
    <a routerLink="/" class="flex cursor-pointer items-center gap-2 text-white transition-colors hover:text-[#1ed760]">
      <i class='bx bxs-music bx-sm text-[#1ed760]'></i>
      <span class="text-xl font-bold tracking-wider">Melono</span>
    </a>

    <nav class="hidden items-center gap-6 md:flex">
      <a routerLink="/" class="flex items-center gap-1 text-[15px] font-medium text-gray-300 transition-colors hover:text-white">
        <i class='bx bx-home-alt text-xl'></i> Trang ch&#7911;
      </a>
      <a routerLink="/genre" class="flex items-center gap-1 text-[15px] font-medium text-gray-300 transition-colors hover:text-white">
        <i class='bx bx-category text-xl'></i> Th&#7875; lo&#7841;i
      </a>
      <a routerLink="/library" class="flex items-center gap-1 text-[15px] font-medium text-gray-300 transition-colors hover:text-white">
        <i class='bx bx-library text-xl'></i> Th&#432; vi&#7879;n
      </a>
    </nav>
  </div>

  <div class="hidden max-w-xl flex-1 px-6 sm:block">
    <div class="group relative w-full">
      <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
        <i class="bx bx-search text-[22px] text-gray-400 transition-colors group-focus-within:text-white"></i>
      </div>
      <input
        type="text"
        placeholder="B&#7841;n mu&#7889;n nghe b&agrave;i h&aacute;t n&agrave;o?"
        (keyup.enter)="onSearch($event)"
        (input)="onSearchInput($event)"
        class="w-full rounded-full border border-transparent bg-[#1c1c28] py-2.5 pl-10 pr-4 text-[15px] text-gray-100 placeholder-gray-400 transition-all hover:bg-[#252533] focus:border-white/20 focus:bg-[#252533] focus:outline-none"
      />
    </div>
  </div>

  <div class="flex items-center gap-4">
    <ng-container *ngIf="currentUser$ | async as user">
      <!-- Admin Management Link -->
      <a
        *ngIf="isAdmin()"
        routerLink="/admin"
        class="inline-flex items-center gap-1.5 rounded-full px-3 py-1.5 text-sm font-bold text-emerald-300 transition-all hover:bg-emerald-500 hover:text-slate-950"
      >
        <i class='bx bx-shield-quarter text-xl'></i>
        <span>Trang quản lý Admin</span>
      </a>

      <!-- Artist Dashboard Link -->
      <a
        *ngIf="isArtist()"
        routerLink="/artist"
        class="inline-flex items-center gap-1.5 rounded-full px-3 py-1.5 text-sm font-bold text-emerald-300 transition-all hover:bg-emerald-500 hover:text-slate-950"
      >
        <i class='bx bx-upload text-xl'></i>
        <span>Upload nhạc</span>
      </a>

      <!-- Standard User Register Artist Link -->
      <a
        *ngIf="!isAdmin() && !isArtist()"
        routerLink="/artist-request"
        class="inline-flex items-center gap-1.5 rounded-full px-3 py-1.5 text-sm font-bold text-gray-300 transition-all hover:bg-white hover:text-black"
      >
        <i class='bx bx-microphone text-xl'></i>
        <span>Đăng ký nghệ sĩ</span>
      </a>
    </ng-container>

    <!-- Guest Register Artist Link -->
    <a
      *ngIf="!(currentUser$ | async)"
      routerLink="/artist-request"
      class="inline-flex items-center gap-1.5 rounded-full px-3 py-1.5 text-sm font-bold text-gray-300 transition-all hover:bg-white hover:text-black"
    >
      <i class='bx bx-microphone text-xl'></i>
      <span>Đăng ký nghệ sĩ</span>
    </a>

    <ng-container *ngIf="currentUser$ | async as user; else loginTemplate">
      <div class="group relative ml-2 font-sans">
        <button class="flex cursor-pointer items-center gap-2 rounded-full border border-white/5 bg-black/40 p-1 pr-3 transition-colors hover:bg-[#1c1c28]">
          <img [src]="user.avatarUrl" alt="Avatar" class="h-8 w-8 rounded-full object-cover" />
          <span class="max-w-[100px] truncate text-sm font-bold text-white">{{ user.name }}</span>
          <i class='bx bx-chevron-down text-gray-400'></i>
        </button>
        <div class="invisible absolute right-0 top-full z-50 mt-2 w-56 rounded-lg border border-white/5 bg-[#252533] py-1 opacity-0 shadow-[0_8px_24px_rgba(0,0,0,0.5)] transition-all duration-200 group-hover:visible group-hover:opacity-100">
          <div class="border-b border-white/5 px-4 py-3">
            <p class="truncate text-[15px] font-bold text-white">{{ user.name }}</p>
            <p class="truncate text-sm text-gray-400">{{ user.email }}</p>
          </div>
          <div class="py-1">
            <a routerLink="/profile" class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-300 transition-colors hover:bg-white/10 hover:text-white">
              <i class='bx bx-user-circle text-lg'></i> H&#7891; s&#417; c&aacute; nh&acirc;n
            </a>
            <a routerLink="/library" class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-300 transition-colors hover:bg-white/10 hover:text-white">
              <i class='bx bx-library text-lg'></i> Th&#432; vi&#7879;n
            </a>
          </div>
          <div class="border-t border-white/5 py-1">
            <button (click)="logout()" class="flex w-full items-center gap-3 px-4 py-2.5 text-left text-sm font-medium text-red-400 transition-colors hover:bg-white/10 hover:text-red-300">
              <i class='bx bx-log-out text-lg'></i> &#272;&#259;ng xu&#7845;t
            </button>
          </div>
        </div>
      </div>
    </ng-container>

    <ng-template #loginTemplate>
      <div class="ml-2 flex items-center gap-2">
        <a routerLink="/login" class="rounded-full bg-white px-7 py-2.5 text-[15px] font-bold text-black transition-all hover:scale-105">
          &#272;&#259;ng nh&#7853;p
        </a>
      </div>
    </ng-template>
  </div>
</header>
