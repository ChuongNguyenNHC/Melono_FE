<header class="w-full h-16 bg-[#0d0d12] border-b border-white/5 flex items-center justify-between px-6 sticky top-0 z-50">
    <!-- Left Section: Logo & Nav -->
    <div class="flex items-center gap-8">
        <!-- Logo -->
        <a routerLink="/" class="flex items-center gap-2 text-white hover:text-[#1ed760] transition-colors cursor-pointer">
            <i class='bx bxs-music bx-sm text-[#1ed760]'></i>
            <span class="text-xl font-bold tracking-wider">Melono</span>
        </a>
        
        <!-- Navigation Links -->
        <nav class="hidden md:flex items-center gap-6">
            <a routerLink="/" class="text-gray-300 flex items-center gap-1 hover:text-white font-medium text-[15px] transition-colors">
                <i class='bx bx-home-alt text-xl'></i> Home
            </a>
            <a routerLink="/genre" class="text-gray-300 flex items-center gap-1 hover:text-white font-medium text-[15px] transition-colors">
                <i class='bx bx-category text-xl'></i> Genre
            </a>
            <a routerLink="/library" class="text-gray-300 flex items-center gap-1 hover:text-white font-medium text-[15px] transition-colors">
                <i class='bx bx-library text-xl'></i> Library
            </a>
        </nav>
    </div>

    <!-- Center Section: Search -->
    <div class="flex-1 max-w-xl px-6 hidden sm:block">
        <div class="relative w-full group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="bx bx-search text-[22px] text-gray-400 group-focus-within:text-white transition-colors"></i>
            </div>
            <input type="text" placeholder="Bạn muốn nghe bài hát nào?" (keyup.enter)="onSearch($event)" (input)="onSearchInput($event)" class="
                w-full pl-10 pr-4 py-2.5 bg-[#1c1c28] hover:bg-[#252533] focus:bg-[#252533]
                border border-transparent rounded-full 
                focus:outline-none focus:border-white/20 
                text-[15px] text-gray-100 placeholder-gray-400 transition-all">
        </div>
    </div>

    <!-- Right Section: User / Actions -->
    <div class="flex items-center gap-4">
        <button class="hidden md:flex items-center gap-1.5 px-3 py-1.5 rounded-full text-gray-300 hover:text-black hover:bg-white transition-all text-sm font-bold">
            <i class='bx bx-upload text-xl'></i>
            <span>Upload</span>
        </button>

        <ng-container *ngIf="currentUser$ | async as user; else loginTemplate">
            <!-- User Menu -->
            <div class="relative group ml-2 font-sans">
                <button class="flex items-center gap-2 p-1 pr-3 rounded-full bg-black/40 hover:bg-[#1c1c28] transition-colors border border-white/5 cursor-pointer">
                    <img [src]="user.avatarUrl" alt="Avatar" class="w-8 h-8 rounded-full object-cover">
                    <span class="text-sm font-bold text-white max-w-[100px] truncate">{{ user.name }}</span>
                    <i class='bx bx-chevron-down text-gray-400'></i>
                </button>
                <div class="absolute right-0 top-full mt-2 w-56 bg-[#252533] rounded-lg shadow-[0_8px_24px_rgba(0,0,0,0.5)] border border-white/5 py-1 
                            opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                    <div class="px-4 py-3 border-b border-white/5">
                        <p class="text-[15px] font-bold text-white truncate">{{ user.name }}</p>
                        <p class="text-sm text-gray-400 truncate">{{ user.email }}</p>
                    </div>
                    <div class="py-1">
                        <a routerLink="/auth/profile" class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-300 hover:text-white hover:bg-white/10 transition-colors">
                            <i class='bx bx-user text-lg'></i> Hồ sơ
                        </a>
                        <a routerLink="/auth/settings" class="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-gray-300 hover:text-white hover:bg-white/10 transition-colors">
                            <i class='bx bx-cog text-lg'></i> Cài đặt
                        </a>
                    </div>
                    <div class="border-t border-white/5 py-1">
                        <button (click)="logout()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-red-400 hover:text-red-300 hover:bg-white/10 transition-colors text-left">
                            <i class='bx bx-log-out text-lg'></i> Đăng xuất
                        </button>
                    </div>
                </div>
            </div>
        </ng-container>

        <ng-template #loginTemplate>
            <div class="flex items-center gap-2 ml-2">
                <a routerLink="/auth/login" class="px-7 py-2.5 bg-white text-black hover:scale-105 rounded-full text-[15px] font-bold transition-all">
                    Đăng nhập
                </a>
            </div>
        </ng-template>
    </div>
</header>
