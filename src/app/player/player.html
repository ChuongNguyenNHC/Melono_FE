<div *ngIf="playerService.currentSong$ | async as song" class="w-full bg-[#181818] border-t border-white/5 z-50 text-white shadow-[0_-10px_30px_rgba(0,0,0,0.5)] animate-slide-up flex flex-col transition-all duration-300" [class.p-3]="isExpanded" [class.p-2]="!isExpanded">
  
  <!-- Collapsed Player (Sidebar narrow) -->
  <div *ngIf="!isExpanded" class="flex flex-col items-center gap-2">
    <div class="relative group cursor-pointer w-full aspect-square" (click)="togglePlay()">
      <img [src]="song.coverUrl" alt="cover" class="w-full h-full object-cover shadow-md rounded group-hover:opacity-50 transition-opacity">
      <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
        <i *ngIf="(playerService.isPlaying$ | async)" class='bx bx-pause text-5xl'></i>
        <i *ngIf="!(playerService.isPlaying$ | async)" class='bx bx-play text-5xl ml-1'></i>
      </div>
    </div>
  </div>

  <!-- Expanded Player -->
  <div *ngIf="isExpanded" class="flex flex-col gap-3">
    <!-- Top: Info -->
    <div class="flex items-center gap-3 w-full">
      <div class="relative group w-[56px] h-[56px] flex-shrink-0 cursor-pointer">
        <img [src]="song.coverUrl" alt="cover" class="w-full h-full object-cover rounded shadow-md group-hover:opacity-80 transition-opacity">
        <div class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity rounded">
          <i class='bx bx-chevron-down text-2xl relative'></i>
        </div>
      </div>
      
      <div class="flex flex-col truncate flex-1 justify-center">
        <span class="font-bold text-[14px] hover:underline cursor-pointer truncate pb-[2px]">{{ song.title }}</span>
        <span class="text-[12px] text-gray-400 hover:text-white hover:underline cursor-pointer truncate">{{ song.artist }}</span>
      </div>
      <div class="flex items-center pl-1 pr-1">
        <i class='bx bx-heart text-xl text-gray-400 hover:text-white cursor-pointer transition-colors'></i>
      </div>
    </div>

    <!-- Middle: Controls -->
    <div class="flex flex-col w-full mt-1">
      <div class="flex items-center justify-center gap-4 mb-2">
        <button class="text-gray-400 hover:text-white transition-colors" title="Bật trộn bài">
          <i class='bx bx-shuffle text-[18px]'></i>
        </button>
        
        <button class="text-gray-400 hover:text-white transition-colors" title="Trở lại">
          <i class='bx bxs-skip-previous text-2xl'></i>
        </button>
        
        <!-- Play/Pause -->
        <button (click)="togglePlay()" class="w-8 h-8 flex items-center justify-center bg-white text-black rounded-full hover:scale-105 transition-transform shadow-md" title="Phát/Tạm dừng">
          <i *ngIf="(playerService.isPlaying$ | async)" class='bx bx-pause text-2xl'></i>
          <i *ngIf="!(playerService.isPlaying$ | async)" class='bx bx-play text-2xl ml-[2px] mt-[1px]'></i>
        </button>

        <button class="text-gray-400 hover:text-white transition-colors" title="Tiếp theo">
          <i class='bx bxs-skip-next text-2xl'></i>
        </button>
        
        <button class="text-gray-400 hover:text-white transition-colors" title="Bật lặp lại">
          <i class='bx bx-repeat text-[18px]'></i>
        </button>
      </div>

      <!-- Progress bar -->
      <div class="flex items-center gap-2 w-full">
        <span class="text-[10px] text-gray-400 min-w-[30px] text-right font-medium tracking-wide">0:00</span>
        <div class="h-1.5 bg-[#4d4d4d] rounded-full flex-1 group/progress cursor-pointer relative flex items-center">
          <div class="h-full bg-white group-hover/progress:bg-[#1ed760] rounded-full w-1/3 relative z-10 transition-colors"></div>
          <div class="absolute left-1/3 -ml-1.5 w-3 h-3 bg-white rounded-full opacity-0 group-hover/progress:opacity-100 z-20 shadow"></div>
        </div>
        <span class="text-[10px] text-gray-400 min-w-[30px] font-medium tracking-wide">0:30</span>
      </div>
    </div>

    <!-- Bottom: Volume (Only shows slider on hover) -->
    <div class="flex items-center justify-end w-full group/volcontainer mt-1">
       <div class="flex items-center relative gap-2">
         <!-- The slider container -->
         <div class="w-0 opacity-0 group-hover/volcontainer:w-24 group-hover/volcontainer:opacity-100 overflow-hidden transition-all duration-300 ease-out flex items-center h-1.5 bg-[#4d4d4d] rounded-full cursor-pointer relative group/slider">
           <div class="h-full bg-white group-hover/slider:bg-[#1ed760] rounded-full w-2/3 transition-colors absolute top-0 left-0 min-w-[20px]"></div>
           <div class="absolute left-2/3 w-3 h-3 bg-white rounded-full opacity-0 group-hover/slider:opacity-100 shadow border border-white transform -translate-x-1/2 -mt-[3px]"></div>
         </div>
         <!-- Volume Icon ALWAYS visible -->
         <button class="text-gray-400 hover:text-white transition-colors" title="Âm lượng">
           <i class='bx bx-volume-full text-[20px]'></i>
         </button>
       </div>
    </div>
  </div>
</div>
