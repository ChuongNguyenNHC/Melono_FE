<div *ngIf="playerService.currentSong$ | async as song"
  class="w-full bg-[#181818]/70 backdrop-blur-3xl border-t border-white/10 z-50 text-white shadow-[0_-10px_30px_rgba(0,0,0,0.5)] animate-slide-up flex flex-col transition-all duration-300"
  [class.p-3]="isExpanded" [class.p-2]="!isExpanded">

  <!-- Collapsed Player (Sidebar narrow) -->
  <div *ngIf="!isExpanded" class="flex flex-col items-center gap-2">
    <div class="relative group cursor-pointer w-full aspect-square" (click)="togglePlay()">
      <img [src]="song.coverUrl" alt="cover"
        class="w-full h-full object-cover shadow-md rounded group-hover:opacity-50 transition-opacity">
      <div
        class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
        <i *ngIf="(playerService.isPlaying$ | async)" class='bx bx-pause text-5xl'></i>
        <i *ngIf="!(playerService.isPlaying$ | async)" class='bx bx-play text-5xl ml-1'></i>
      </div>
    </div>
  </div>

  <!-- Expanded Player -->
  <div *ngIf="isExpanded" class="flex flex-col gap-3">
    <!-- Top: Info -->
    <div class="flex items-center gap-3 w-full">
      <div [routerLink]="['/song', song.id]" class="relative group w-[56px] h-[56px] shrink-0 cursor-pointer">
        <img [src]="song.coverUrl" alt="cover"
          class="w-full h-full object-cover rounded shadow-md group-hover:opacity-80 transition-opacity">
        <div
          class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity rounded">
          <i class='bx bx-show text-2xl relative'></i>
        </div>
      </div>

      <div class="flex flex-col truncate flex-1 justify-center">
        <span [routerLink]="['/song', song.id]" class="font-bold text-[14px] hover:underline cursor-pointer truncate pb-[2px]">{{ song.title }}</span>
        <span class="text-[12px] text-gray-400 hover:text-white hover:underline cursor-pointer truncate">{{ song.artist
          }}</span>
      </div>
      <div class="flex items-center pl-1 pr-1">
        <button type="button" (click)="toggleLike(song)" class="flex items-center justify-center transition-transform hover:scale-110" [ngClass]="isSongLiked(song) ? 'text-[#1ed760]' : 'text-gray-400 hover:text-white'" [title]="isSongLiked(song) ? 'Bỏ thích' : 'Thích bài hát'">
          <i class="bx text-xl" [ngClass]="isSongLiked(song) ? 'bxs-heart text-[#1ed760]' : 'bx-heart'"></i>
        </button>
      </div>
    </div>

    <!-- Middle: Controls -->
    <div class="flex flex-col w-full mt-1">
      <div class="flex items-center justify-center gap-4 mb-2">
        <button (click)="toggleShuffle()" 
          [disabled]="isShuffleDisabled(song)"
          class="transition-colors" 
          [class.text-[#1ed760]]="(playerService.isShuffle$ | async) && !isShuffleDisabled(song)"
          [class.text-gray-400]="!(playerService.isShuffle$ | async) || isShuffleDisabled(song)"
          [class.hover:text-white]="!(playerService.isShuffle$ | async) && !isShuffleDisabled(song)"
          [class.opacity-30]="isShuffleDisabled(song)"
          [class.cursor-not-allowed]="isShuffleDisabled(song)"
          [title]="isShuffleDisabled(song) ? 'Không thể trộn bài (Bài hát không thuộc playlist nào)' : 'Bật trộn bài'">
          <i class='bx bx-shuffle text-[18px]'></i>
        </button>

        <button (click)="previousSong()" class="text-gray-400 hover:text-white transition-colors" title="Trở lại">
          <i class='bx bxs-skip-previous text-2xl'></i>
        </button>

        <!-- Play/Pause -->
        <button (click)="togglePlay()"
          class="w-8 h-8 flex items-center justify-center bg-white text-black rounded-full hover:scale-105 transition-transform shadow-md"
          title="Phát/Tạm dừng">
          <i *ngIf="(playerService.isPlaying$ | async)" class='bx bx-pause text-2xl'></i>
          <i *ngIf="!(playerService.isPlaying$ | async)" class='bx bx-play text-2xl ml-[2px] mt-px'></i>
        </button>

        <button (click)="nextSong()" class="text-gray-400 hover:text-white transition-colors" title="Tiếp theo">
          <i class='bx bxs-skip-next text-2xl'></i>
        </button>

        <button (click)="toggleRepeat()" 
          class="transition-colors relative" 
          [class.text-[#1ed760]]="(playerService.repeatMode$ | async) !== 'none'"
          [class.text-gray-400]="(playerService.repeatMode$ | async) === 'none'"
          [class.hover:text-white]="(playerService.repeatMode$ | async) === 'none'"
          title="Bật lặp lại">
          <i class='bx bx-repeat text-[18px]'></i>
          <!-- Repeat One Indicator -->
          <span *ngIf="(playerService.repeatMode$ | async) === 'one'" class="absolute -top-1 -right-1 text-[8px] font-bold">1</span>
        </button>
      </div>

      <!-- Progress bar -->
      <div class="flex items-center gap-2 w-full">
        <span class="text-[10px] text-gray-400 min-w-[30px] text-right font-medium tracking-wide">{{ formatTime(currentTime) }}</span>
        <div class="h-1.5 bg-[#4d4d4d] rounded-full flex-1 group/progress cursor-pointer relative flex items-center">
          <div class="absolute inset-y-0 left-0 h-full bg-white group-hover/progress:bg-[#1ed760] rounded-full z-10 transition-colors pointer-events-none" [style.width.%]="progressPercent"></div>
          <div class="absolute w-3 h-3 bg-white rounded-full opacity-0 group-hover/progress:opacity-100 z-20 shadow transform -translate-x-1/2 top-[-3px] pointer-events-none" [style.left.%]="progressPercent"></div>
          <input type="range" class="w-full h-full absolute inset-0 opacity-0 z-30 cursor-pointer" min="0" [max]="duration || 0.1" step="0.1" [value]="currentTime" (input)="onSeek($event)">
        </div>
        <span class="text-[10px] text-gray-400 min-w-[30px] font-medium tracking-wide">{{ formatTime(duration) }}</span>
      </div>
    </div>

    <!-- Bottom: Volume (Only shows slider on hover) -->
    <div class="flex items-center justify-end w-full group/volcontainer mt-1 h-6">
      <div class="flex items-center relative gap-2 h-full">
        <!-- Outer wrapper with overflow-hidden to animate width safely -->
        <div
          class="w-0 opacity-0 group-hover/volcontainer:w-24 group-hover/volcontainer:opacity-100 overflow-hidden transition-all duration-300 ease-out flex items-center h-6 relative">
          <!-- Inner slider track container without overflow-hidden -->
          <div class="h-1.5 bg-[#4d4d4d] rounded-full w-full cursor-pointer relative flex items-center group/slider mx-1.5">
            <div
              class="h-full bg-white group-hover/slider:bg-[#1ed760] rounded-full transition-colors absolute top-0 left-0 min-w-[2px]"
              [style.width.%]="volume * 100">
            </div>
            <div
              class="absolute w-3 h-3 bg-white rounded-full opacity-0 group-hover/slider:opacity-100 shadow border border-white transform -translate-x-1/2 top-[-3px]"
              [style.left.%]="volume * 100">
            </div>
            <input type="range" min="0" max="1" step="0.01" [value]="volume" (input)="onVolumeChange($event)"
              class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
          </div>
        </div>
        <!-- Volume Icon ALWAYS visible -->
        <button class="text-gray-400 hover:text-white transition-colors flex items-center justify-center" title="Âm lượng" (click)="toggleMute()">
          <i class='bx text-[20px]'
            [ngClass]="volume === 0 ? 'bx-volume-mute' : (volume < 0.5 ? 'bx-volume-low' : 'bx-volume-full')"></i>
        </button>
      </div>
    </div>
  </div>
</div>
