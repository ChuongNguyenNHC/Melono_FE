<div
  *ngIf="isOpen && modalType === 'deleteSong'"
  class="fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/70 p-4 backdrop-blur-sm"
  (click)="close.emit()"
>
  <div
    class="w-full max-w-lg rounded-[2rem] border border-white/10 bg-slate-950 p-6 shadow-2xl"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-start justify-between gap-4">
      <div>
        <h3 class="text-2xl font-semibold text-white">Xóa bài hát</h3>
        <p class="mt-2 text-sm leading-6 text-slate-400">
          Bạn có chắc muốn xóa bài hát này không?
        </p>
        <p class="mt-1 text-sm text-rose-300">
          Hành động này không thể hoàn tác.
        </p>
      </div>

      <button
        type="button"
        (click)="close.emit()"
        class="flex h-10 w-10 items-center justify-center rounded-2xl bg-white/5 text-slate-300 transition hover:bg-white/10"
      >
        <i class="bx bx-x text-xl"></i>
      </button>
    </div>

    <div *ngIf="songPendingDelete" class="mt-6 rounded-2xl bg-white/5 p-4 text-sm text-slate-300">
      <p class="font-semibold text-white">{{ songPendingDelete.title }}</p>
      <p class="mt-1 text-slate-400">{{ songPendingDelete.genre }}</p>
    </div>

    <div class="mt-8 flex flex-wrap justify-end gap-3">
      <button
        type="button"
        (click)="close.emit()"
        class="rounded-2xl bg-white/5 px-5 py-3 text-sm font-semibold text-slate-300 ring-1 ring-inset ring-white/10 transition hover:bg-white/10"
      >
        Hủy
      </button>

      <button
        type="button"
        (click)="confirmDeleteSong.emit()"
        class="rounded-2xl bg-rose-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-rose-500"
      >
        Xóa bài hát
      </button>
    </div>
  </div>
</div>
