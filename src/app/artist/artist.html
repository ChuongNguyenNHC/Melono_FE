<section class="h-full w-full flex flex-col bg-[#0d0d12] text-slate-100 overflow-hidden">
  <!-- Top Navigation Tab Bar for Artist Dashboard -->
  <div class="border-b border-white/10 bg-slate-950/40 px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4 shrink-0">
    <div class="flex items-center space-x-3">
      <span class="flex h-11 w-11 items-center justify-center rounded-xl bg-emerald-500/10 text-emerald-400 text-2xl">
        <i class="bx bxs-user-detail"></i>
      </span>
      <div>
        <h2 class="text-base font-bold text-white tracking-tight leading-tight">Dashboard Nghệ Sĩ</h2>
        <p class="text-xs text-slate-400 font-semibold mt-0.5">Nghệ sĩ: <span class="text-emerald-400">{{ stageName }}</span></p>
      </div>
    </div>
  </div>

  <!-- Artist Content Scroll Container -->
  <div class="flex-1 min-w-0 overflow-y-auto scrollbar-hide">
    <!-- Main Content Area -->
    <main class="px-4 py-6 sm:px-6 xl:px-8 min-h-[calc(100vh-280px)] flex flex-col justify-between">
      <div class="flex-1 pb-8">
        <app-artist-management
          class="block"
          [mode]="managementMode"
          [songs]="managementSongs"
          [search]="managementSearch"
          [statusFilter]="managementStatusFilter"
          [songForm]="songForm"
          [genreOptions]="genreOptions"
          [rejectedReason]="editingRejectReason"
          (searchChange)="managementSearch = $event"
          (statusFilterChange)="managementStatusFilter = $event"
          (refresh)="refreshManagement()"
          (openUpload)="openUploadForm()"
          (openEdit)="openEditForm($event)"
          (openDelete)="openDeleteModal($event)"
          (audioFileSelected)="onAudioFileSelected($event)"
          (thumbnailFileSelected)="onThumbnailFileSelected($event)"
          (audioFileRemoved)="onAudioFileRemoved()"
          (thumbnailFileRemoved)="onThumbnailFileRemoved()"
          (cancelForm)="cancelSongForm()"
          (submitForm)="submitSongForm()"
          (hideSong)="hideSong($event)"
          (restoreSong)="restoreSong($event)"
        ></app-artist-management>
      </div>

      <!-- Global Footer -->
      <div class="shrink-0 pt-6">
        <app-footer></app-footer>
      </div>
    </main>
  </div>

  <!-- Drawers & Modals -->
  <app-artist-drawer
    [isOpen]="isDrawerOpen"
    [drawerType]="drawerType"
    [selectedSong]="selectedSong"
    (close)="closeDrawer()"
    (editSong)="openEditForm($event)"
  ></app-artist-drawer>

  <app-artist-modal
    [isOpen]="isModalOpen"
    [modalType]="modalType"
    [songPendingDelete]="songPendingDelete"
    (close)="closeModal()"
    (confirmDeleteSong)="confirmDeleteSong()"
  ></app-artist-modal>
</section>
